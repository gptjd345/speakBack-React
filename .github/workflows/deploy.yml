name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─── 프론트엔드: S3 + CloudFront ─────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_ENV: production
        run: npm run build

      - name: AWS 자격증명 설정 (배포용)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - name: S3 업로드
        run: |
          aws s3 sync frontend/build s3://${{ secrets.DEPLOY_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          # index.html은 캐시 비활성화 (항상 최신 버전 서빙)
          aws s3 cp frontend/build/index.html s3://${{ secrets.DEPLOY_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: CloudFront 캐시 무효화
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─── 백엔드: Docker Hub + EC2 ───────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & 푸시
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/speakback-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $IMAGE:$IMAGE_TAG .
          docker push $IMAGE:$IMAGE_TAG
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:latest
          docker push $IMAGE:latest

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/speakback
            export IMAGE_TAG=${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose -f docker-compose.prod.yml pull fastapi
            docker compose -f docker-compose.prod.yml up -d --no-deps fastapi
